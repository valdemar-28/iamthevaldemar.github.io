    <style>
        .image-gallery {
            display: flex;               /* Activates Flexbox layout layout */
            justify-content: center;     /* Centers images horizontally (use 'space-between' for equal edges) */
            align-items: center;         /* Vertically aligns images if they have different heights */
            gap: 20px;                   /* Creates clean, uniform spacing between the image links */
            flex-wrap: wrap;             /* Forces links to wrap nicely onto new lines on mobile devices */
        }

        /* Image sizing configuration */
        .image-gallery a img {
            width: 200px;                /* Controls explicit width */
            height: 200px;               /* Controls explicit height */
            object-fit: cover;           /* Ensures photos do not warp or stretch out of aspect ratio */
        }
    </style>
</head>
